name: Repo Health Checker

on:
  push:
    branches:
      - "**"

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Give Execute Permission
        run: chmod +x check.sh

      - name: Run Health Checks
        run: ./check.sh